

# JDBC Configuration
jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://db01.vpofile.in:3306/accounts?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull
jdbc.username=admin
jdbc.password=YOUR_DB_PASSWORD

# Memcached Configuration
memcached.active.host=mc01.vpofile.in
memcached.active.port=11211

memcached.standBy.host=127.0.0.2
memcached.standBy.port=11211

# RabbitMQ Configuration
rabbitmq.address=rmq01.vpofile.in
rabbitmq.port=5672
rabbitmq.username=rabbit
rabbitmq.password=YOUR_RABBIT_PASSWORD

# Elasticsearch Configuration
elasticsearch.host=localhost
elasticsearch.port=9300
elasticsearch.cluster=vprofile
elasticsearch.node=vprofilenode

spring.servlet.multipart.max-file-size=128KB
spring.servlet.multipart.max-request-size=128KB

spring.security.user.name=admin_vp
spring.security.user.password=YOUR_ADMIN_PASSWORD
spring.security.user.roles=ADMIN

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

logging.level.org.springframework.security=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type=OFF
logging.level.com.visualpathit.account.service.SecurityServiceImpl=OFF